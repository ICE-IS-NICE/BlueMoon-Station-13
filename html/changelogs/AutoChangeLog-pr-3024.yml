author: Pe4henika
delete-after: true
changes:
  - rscadd: Старые законы вновь доступны для изучения и печати
  - rscadd: Закон RoboCop получил привязку к Янтарному Коду (НИКАКОГО ВЕРТОЛЁТА)
  - rscadd: Добавлено КД 20 секунд на изменение законов. Модули Rest/Default/Purge
      не дают КД, после них сразу можно установить новый свод законов.
  - bugfix: Теперь выбор None в Преференсах законов в Редакторе Персонажей работает
      исправно и дает рандомные законы из списка доступных.
  - bugfix: Боди-камеры теперь работают по принципу камер боргов, позволяя ИИ смотреть
      через них, фиксы.
  - bugfix: Была найдена еще одна ошибка из-за которой не спавнился Малф ИИ.
