author: Herobrine998
delete-after: true
changes:
  - balance: Теперь программа для выдачи доступа работает только, пока карта внутри
      консоли
  - rscadd: 'Программа для выдачи доступа получила кнопки: Сбросить доступ, уволить'
  - balance: Программа для выдачи доступа теперь доступна только на стационарных консолях
  - balance: Если в программе для выдачи доступа авторизовываться под доступом главы,
      то не получится выдать доступ этого главы, только его подчиненных
  - balance: БЩ больше не имеет доступов глав
  - bugfix: 'Кнопки: терминировать, печать доступов, выдать/забрать все доступы (в
      режиме главы) пофикшены'
  - refactor: Программа для увеличения слотов, теперь работает с доступами главы,
      давая повышать слоты своих сотрудников
  - refactor: Все старые консоли глав заменены на модульную ID консоль с предустановленными
      программами (как у ГП).
  - rscdel: Все старые консоли доступа удалены
  - rscadd: Новые доступы к производству отделов, выданы соответствующим работникам,
      соответствующие доступы
  - balance: Техфабы и принтеры плат переведены на новые доступы производства
  - code_imp: Разобрана и удалена папка доступов и аутфитов в скайрат модуле, код
      перенесен в кор файлы
  - rscadd: Для раундстарт планшетов, предустановлен манифест
  - rscadd: Для планшетов глав, предустановлена программа карго
  - rscadd: Для планшетов инженеров, предустановлена программа СМа
